<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ImgurLite | галерея изображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* header */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 0.8rem;
            color: #6b6b6b;
            display: block;
        }

        .user-panel {
            background: #1a1a1a;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            backdrop-filter: blur(4px);
        }

        button {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #ffffff;
            color: #0a0a0a;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #e0e0e0;
            transform: scale(0.98);
        }

        .btn-outline {
            border: 1px solid #3a3a3a;
            padding: 0.45rem 1.2rem;
            border-radius: 30px;
            background: transparent;
            color: #e0e0e0;
        }

        .btn-outline:hover {
            background: #2a2a2a;
        }

        /* формы */
        .auth-card, .upload-card {
            background: #111111;
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #2a2a2a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1px solid #2e2e2e;
            border-radius: 24px;
            font-size: 0.95rem;
            background: #1e1e1e;
            color: #ffffff;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #5a5a5a;
            background: #252525;
        }

        .flex-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        /* галерея - стиль как Imgur */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        .image-card {
            background: #131313;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid #252525;
            cursor: pointer;
        }

        .image-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
            border-color: #3a3a3a;
        }

        .image-wrapper {
            position: relative;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            transition: 0.2s;
        }

        .card-info {
            padding: 1rem 1.2rem;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-bottom: 0.5rem;
        }

        .username {
            font-weight: 600;
            color: #dddddd;
            background: #1f1f1f;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        .date-badge {
            font-size: 0.7rem;
            color: #6a6a6a;
        }

        .caption-text {
            font-size: 0.9rem;
            margin: 0.5rem 0;
            color: #cfcfcf;
            word-break: break-word;
            line-height: 1.4;
        }

        .stats-bar {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-top: 0.7rem;
            padding-top: 0.5rem;
            border-top: 1px solid #252525;
        }

        .like-button {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: transparent;
            padding: 0.3rem 0.7rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #bdbdbd;
            transition: 0.1s;
        }

        .like-button.liked {
            color: #ff4d4d;
        }

        .like-button:hover {
            background: #232323;
        }

        .delete-image {
            margin-left: auto;
            background: transparent;
            font-size: 1rem;
            opacity: 0.6;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
        }

        .delete-image:hover {
            opacity: 1;
            background: #2c2c2c;
            color: #ff7b7b;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #0f0f0f;
            border-radius: 48px;
            color: #6b6b6b;
            font-size: 1rem;
            border: 1px dashed #2a2a2a;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            backdrop-filter: blur(10px);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 2000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            border: 1px solid #3a3a3a;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 680px) {
            .container {
                padding: 1rem;
            }
            .site-header {
                flex-direction: column;
                align-items: stretch;
            }
            .user-panel {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="site-header">
        <div class="logo">
            <h1>imgur<span style="font-weight:300">lite</span></h1>
            <span>сообщество изображений</span>
        </div>
        <div id="userWidget" class="user-panel">
            <span id="greetingText"></span>
            <div id="actionButtons"></div>
        </div>
    </div>

    <!-- форма входа / регистрации -->
    <div id="authBlock" class="auth-card">
        <div style="margin-bottom: 0.5rem;">
            <h3 style="font-weight: 500;">🔐 вход в галерею</h3>
        </div>
        <div class="form-group">
            <input type="text" id="authUsername" placeholder="Имя пользователя" autocomplete="username">
        </div>
        <div class="form-group">
            <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password">
        </div>
        <div class="flex-row">
            <button id="loginBtn" class="btn-primary">Войти</button>
            <button id="registerBtn" class="btn-outline">Создать аккаунт</button>
        </div>
        <p style="font-size: 0.7rem; margin-top: 1rem; color: #6b6b6b;">⭐ Все фото хранятся на внешнем хостинге (ImgBB). Ваши изображения доступны всегда.</p>
    </div>

    <!-- зона загрузки (видна только авторизованным) -->
    <div id="uploadBlock" style="display: none;" class="upload-card">
        <h3 style="font-weight: 500; margin-bottom: 1rem;">📤 новая публикация</h3>
        <div class="form-group">
            <input type="file" id="imageFile" accept="image/jpeg,image/png,image/webp,image/gif">
        </div>
        <div class="form-group">
            <textarea id="imageCaption" rows="2" placeholder="описание (необязательно)"></textarea>
        </div>
        <button id="publishBtn" class="btn-primary">⬆ загрузить в ImgurLite</button>
        <div id="uploadStatusMsg" style="font-size: 0.75rem; margin-top: 0.7rem; color: #9a9a9a;"></div>
    </div>

    <!-- галерея -->
    <div style="margin: 1rem 0 0.5rem 0;">
        <h2 style="font-weight: 500; font-size: 1.5rem;">🔥 лента изображений</h2>
    </div>
    <div id="galleryGrid" class="gallery-grid">
        <div class="empty-state">загрузка фотографий...</div>
    </div>
</div>

<div id="toastMessage" class="toast"></div>

<script>
    // ======================== ИМИТАЦИЯ БАЗЫ ДАННЫХ (LOCALSTORAGE) ========================
    // Хранилище работает как серверная БД: пользователи, посты (изображения с ссылками на ImgBB)
    // Все изображения загружаются на реальный хостинг ImgBB, в БД сохраняются только URL.
    // Комментарии ПОЛНОСТЬЮ УБРАНЫ, только лайки, удаление, загрузка.
    
    const DB_KEYS = {
        USERS: 'imgurlite_users_db',
        POSTS: 'imgurlite_posts_db',
        SESSION: 'imgurlite_session'
    };

    // API ImgBB (рабочий публичный ключ для хостинга)
    const IMGBB_API = 'https://api.imgbb.com/1/upload';
    const IMGBB_KEY = '6d207e02198a847aa98d0a2a901485a5';

    // ---- вспомогательные функции ----
    function showToast(text, duration = 2800) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = text;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    // --- работа с "БД" ---
    function getUsers() {
        const data = localStorage.getItem(DB_KEYS.USERS);
        return data ? JSON.parse(data) : [];
    }

    function saveUsers(users) {
        localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users));
    }

    function getPosts() {
        const data = localStorage.getItem(DB_KEYS.POSTS);
        return data ? JSON.parse(data) : [];
    }

    function savePosts(posts) {
        localStorage.setItem(DB_KEYS.POSTS, JSON.stringify(posts));
    }

    function getCurrentSession() {
        const session = localStorage.getItem(DB_KEYS.SESSION);
        return session ? JSON.parse(session) : null;
    }

    function setSession(user) {
        if (user) {
            localStorage.setItem(DB_KEYS.SESSION, JSON.stringify(user));
        } else {
            localStorage.removeItem(DB_KEYS.SESSION);
        }
    }

    // регистрация
    function registerUser(username, password) {
        const users = getUsers();
        if (users.find(u => u.username === username)) {
            return { ok: false, error: 'Пользователь уже существует' };
        }
        if (username.length < 3) return { ok: false, error: 'Имя минимум 3 символа' };
        if (password.length < 3) return { ok: false, error: 'Пароль минимум 3 символа' };
        const newUser = {
            id: Date.now() + '_' + Math.random().toString(36),
            username: username,
            password: password // демо-проект, в реальном проекте хешировать
        };
        users.push(newUser);
        saveUsers(users);
        return { ok: true, user: { id: newUser.id, username: newUser.username } };
    }

    function loginUser(username, password) {
        const users = getUsers();
        const found = users.find(u => u.username === username && u.password === password);
        if (found) {
            return { ok: true, user: { id: found.id, username: found.username } };
        }
        return { ok: false, error: 'Неверное имя или пароль' };
    }

    // загрузка изображения на ImgBB (облако)
    async function uploadImageToImgBB(file) {
        const formData = new FormData();
        formData.append('key', IMGBB_KEY);
        formData.append('image', file);
        try {
            const response = await fetch(IMGBB_API, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) {
                return { success: true, url: data.data.url };
            } else {
                return { success: false, error: data.error?.message || 'Ошибка загрузки' };
            }
        } catch (err) {
            console.error(err);
            return { success: false, error: 'Сетевая ошибка' };
        }
    }

    // создать пост (изображение) -> сохраняем в БД с внешней ссылкой
    async function createPost(file, caption, userId, username) {
        // 1. загружаем картинку в облако
        const uploadRes = await uploadImageToImgBB(file);
        if (!uploadRes.success) {
            return { success: false, error: uploadRes.error };
        }
        const imageUrl = uploadRes.url; // постоянная ссылка на ImgBB
        
        // 2. сохраняем пост в локальной БД (метаданные)
        const posts = getPosts();
        const newPost = {
            id: Date.now() + '_' + Math.random().toString(36).substring(2, 8),
            userId: userId,
            username: username,
            imageUrl: imageUrl,
            caption: caption.trim() || '',
            createdAt: Date.now(),
            likes: []     // массив ID пользователей, которые лайкнули
        };
        posts.unshift(newPost);
        savePosts(posts);
        return { success: true, post: newPost };
    }

    // удаление поста (только автор)
    function deletePost(postId, currentUserId) {
        let posts = getPosts();
        const postIndex = posts.findIndex(p => p.id === postId);
        if (postIndex === -1) return false;
        if (posts[postIndex].userId !== currentUserId) return false;
        posts.splice(postIndex, 1);
        savePosts(posts);
        return true;
    }

    // лайк / убрать лайк
    function toggleLikeOnPost(postId, userId) {
        const posts = getPosts();
        const post = posts.find(p => p.id === postId);
        if (!post) return false;
        const likedIndex = post.likes.indexOf(userId);
        if (likedIndex === -1) {
            post.likes.push(userId);
        } else {
            post.likes.splice(likedIndex, 1);
        }
        savePosts(posts);
        return true;
    }

    // --- рендер галереи (как imgur: карточки без комментариев) ---
    function renderGallery() {
        const container = document.getElementById('galleryGrid');
        const posts = getPosts();
        const currentUser = getCurrentSession();
        
        if (!posts.length) {
            container.innerHTML = `<div class="empty-state">✨ ещё нет изображений. Станьте первым, кто загрузит фото!</div>`;
            return;
        }
        
        let html = '';
        for (const post of posts) {
            const isLiked = currentUser ? post.likes.includes(currentUser.id) : false;
            const likeCount = post.likes.length;
            const isOwner = currentUser && post.userId === currentUser.id;
            const safeCaption = escapeHtml(post.caption) || '—';
            const formattedDate = new Date(post.createdAt).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
            
            html += `
                <div class="image-card" data-post-id="${post.id}">
                    <div class="image-wrapper">
                        <img class="gallery-img" src="${post.imageUrl}" alt="image" loading="lazy" 
                             onerror="this.src='https://placehold.co/600x600/1a1a1a/666?text=ошибка+загрузки'">
                    </div>
                    <div class="card-info">
                        <div class="user-row">
                            <span class="username">👤 ${escapeHtml(post.username)}</span>
                            <span class="date-badge">${formattedDate}</span>
                        </div>
                        ${safeCaption !== '—' ? `<div class="caption-text">📷 ${safeCaption}</div>` : ''}
                        <div class="stats-bar">
                            <button class="like-button ${isLiked ? 'liked' : ''}" data-action="like" data-id="${post.id}">
                                ${isLiked ? '❤️' : '🤍'} <span class="like-count">${likeCount > 0 ? likeCount : ''}</span>
                            </button>
                            ${isOwner ? `<button class="delete-image" data-action="delete" data-id="${post.id}" title="Удалить фото">🗑️ удалить</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        
        // обработчики лайков и удаления
        container.querySelectorAll('[data-action="like"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const postId = btn.getAttribute('data-id');
                const current = getCurrentSession();
                if (!current) {
                    showToast('Авторизуйтесь, чтобы ставить лайки', 1800);
                    return;
                }
                toggleLikeOnPost(postId, current.id);
                renderGallery(); // обновляем ленту
            });
        });
        
        container.querySelectorAll('[data-action="delete"]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const postId = btn.getAttribute('data-id');
                const current = getCurrentSession();
                if (!current) {
                    showToast('Необходимо войти', 1500);
                    return;
                }
                const success = deletePost(postId, current.id);
                if (success) {
                    showToast('Изображение удалено из галереи', 1800);
                    renderGallery();
                } else {
                    showToast('Нельзя удалить чужой пост', 2000);
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // --- UI авторизации ---
    function updateAuthUI() {
        const currentUser = getCurrentSession();
        const authBlock = document.getElementById('authBlock');
        const uploadBlock = document.getElementById('uploadBlock');
        const greetingSpan = document.getElementById('greetingText');
        const actionDiv = document.getElementById('actionButtons');
        
        if (currentUser) {
            authBlock.style.display = 'none';
            uploadBlock.style.display = 'block';
            greetingSpan.innerHTML = `👋 ${escapeHtml(currentUser.username)}`;
            actionDiv.innerHTML = `<button id="logoutButton" class="btn-outline">Выйти</button>`;
            const logoutBtn = document.getElementById('logoutButton');
            if (logoutBtn) {
                logoutBtn.onclick = () => {
                    setSession(null);
                    updateAuthUI();
                    renderGallery();
                    showToast('Вы вышли из аккаунта', 1500);
                };
            }
        } else {
            authBlock.style.display = 'block';
            uploadBlock.style.display = 'none';
            greetingSpan.innerHTML = '';
            actionDiv.innerHTML = '';
        }
    }
    
    // --- обработчики входа/регистрации ---
    function bindAuthHandlers() {
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authUsername = document.getElementById('authUsername');
        const authPassword = document.getElementById('authPassword');
        
        loginBtn.onclick = () => {
            const username = authUsername.value.trim();
            const password = authPassword.value;
            if (!username || !password) {
                showToast('Введите имя и пароль', 1500);
                return;
            }
            const result = loginUser(username, password);
            if (result.ok) {
                setSession(result.user);
                updateAuthUI();
                renderGallery();
                showToast(`Добро пожаловать, ${result.user.username}`, 2000);
                authUsername.value = '';
                authPassword.value = '';
            } else {
                showToast(result.error, 2500);
            }
        };
        
        registerBtn.onclick = () => {
            const username = authUsername.value.trim();
            const password = authPassword.value;
            if (!username || !password) {
                showToast('Заполните имя и пароль', 1500);
                return;
            }
            const result = registerUser(username, password);
            if (result.ok) {
                setSession(result.user);
                updateAuthUI();
                renderGallery();
                showToast(`Аккаунт создан! Вход выполнен как ${result.user.username}`, 2500);
                authUsername.value = '';
                authPassword.value = '';
            } else {
                showToast(result.error, 2500);
            }
        };
    }
    
    // загрузка поста (с ImgBB)
    function bindUploadHandler() {
        const publishBtn = document.getElementById('publishBtn');
        const fileInput = document.getElementById('imageFile');
        const captionArea = document.getElementById('imageCaption');
        const statusDiv = document.getElementById('uploadStatusMsg');
        
        publishBtn.onclick = async () => {
            const current = getCurrentSession();
            if (!current) {
                showToast('Войдите в аккаунт', 1500);
                return;
            }
            const file = fileInput.files[0];
            if (!file) {
                showToast('Выберите изображение', 1500);
                return;
            }
            if (!file.type.startsWith('image/')) {
                showToast('Поддерживаются только изображения', 1500);
                return;
            }
            if (file.size > 12 * 1024 * 1024) {
                showToast('Максимум 12 МБ', 1800);
                return;
            }
            
            statusDiv.innerHTML = '⏳ Загрузка на ImgBB и сохранение в базу...';
            publishBtn.disabled = true;
            
            const caption = captionArea.value;
            const result = await createPost(file, caption, current.id, current.username);
            
            if (result.success) {
                statusDiv.innerHTML = '✅ Изображение опубликовано! (облачное хранилище)';
                fileInput.value = '';
                captionArea.value = '';
                renderGallery();
                setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
            } else {
                statusDiv.innerHTML = `❌ Ошибка: ${result.error}`;
                setTimeout(() => { if (statusDiv.innerHTML.includes('Ошибка')) statusDiv.innerHTML = ''; }, 4000);
                showToast(`Не удалось загрузить: ${result.error}`, 4000);
            }
            publishBtn.disabled = false;
        };
    }
    
    // инициализация демо-данных (стилизованные пустые стартовые фото? добавим 3 примера для атмосферы, но без комментариев)
    function seedDemoContent() {
        const posts = getPosts();
        if (posts.length === 0) {
            const demoPosts = [
                {
                    id: 'demo1_imglite',
                    userId: 'system_demo',
                    username: 'imgurlite',
                    imageUrl: 'https://i.ibb.co/y4gB9Gq/demo1.jpg',
                    caption: 'городские огни',
                    createdAt: Date.now() - 172800000,
                    likes: []
